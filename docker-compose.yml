version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: truehire-db
    environment:
      POSTGRES_USER: ${DB_USER:-truehire}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-truehire_dev}
      POSTGRES_DB: ${DB_NAME:-truehire}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-truehire}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - truehire-network

  # Redis Cache (Optional)
  redis:
    image: redis:7-alpine
    container_name: truehire-cache
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - truehire-network
    profiles:
      - optional

  # Next.js Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: truehire-app
    environment:
      # Database
      DATABASE_URL: postgresql://${DB_USER:-truehire}:${DB_PASSWORD:-truehire_dev}@postgres:5432/${DB_NAME:-truehire}
      
      # JWT Secrets
      JWT_SECRET: ${JWT_SECRET:-your_jwt_secret_key_here_min_32_chars}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-your_jwt_refresh_secret_key_here_min_32_chars}
      
      # API URLs
      NEXT_PUBLIC_API_URL: http://localhost:3000
      NEXT_PUBLIC_SOCKET_URL: http://localhost:3000
      
      # AWS S3 (optional)
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET:-}
      
      # Redis (optional)
      REDIS_URL: redis://redis:6379
      
      # Node
      NODE_ENV: production
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./prisma:/app/prisma
      - ./public:/app/public
    networks:
      - truehire-network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local

networks:
  truehire-network:
    driver: bridge
